name: Publish vertical data packs

# Runs the pack splitter and uploads the 21 per-vertical JSON packs
# to a GitHub Release. The extension fetches these packs on demand.
#
# Triggers:
#   - Push to `data` branch (auto-publish new packs)
#   - Manual dispatch from Actions tab (repeat a build without pushing)
#
# The extension's bundled verticals-index.json points at
# https://github.com/LighthouseCollection/ShopScout-/releases/download/data-vN/{vertical}.json
# where N = the release version tag from below.

on:
  push:
    branches: [data]
    paths:
      - 'scripts/build-normalization-libraries/**'
      - 'normalization/libraries/generated/**'
      - 'vendor/shopify-taxonomy/**'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v1, v2 — becomes tag `data-vX`)'
        required: true
        default: 'v1'

permissions:
  contents: write  # required to create the release + upload assets

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute release version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          else
            # push to `data` branch: derive from short SHA so every push is unique
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build vertical packs
        env:
          SHOPSCOUT_DATA_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # Ensures the generated library files are current before the splitter runs.
          node scripts/build-normalization-libraries/build-all.js
          # The splitter reads from normalization/libraries/generated/ and writes to dist/packs/.
          node scripts/build-normalization-libraries/build-vertical-packs.js

      - name: Verify pack outputs
        run: |
          ls -la dist/packs/
          # Every pack must be > 10 KB (fixture safety guard against corrupt runs)
          for f in dist/packs/*.json; do
            size=$(stat -c%s "$f")
            if [ "$size" -lt 10240 ] && [ "$(basename $f)" != "manifest.json" ]; then
              echo "PACK TOO SMALL: $f ($size bytes)"; exit 1
            fi
          done

      - name: Create GitHub Release + upload packs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-${{ steps.version.outputs.tag }}
          name: 'Data pack release ${{ steps.version.outputs.tag }}'
          body: |
            ShopScout vertical data packs — auto-generated by `.github/workflows/publish-data-packs.yml`.
            Each pack is loaded on demand by the extension when a list is assigned to the corresponding vertical.

            Verify the bundled `normalization/libraries/generated/verticals-index.json` in the extension
            points at this release tag (`data-${{ steps.version.outputs.tag }}`).
          files: |
            dist/packs/*.json
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
